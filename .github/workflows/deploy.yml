name: Deploy to GitHub Pages

on:
  # Kör vid varje push till main
  push:
    branches: [main]
  # Tillåt manuell körning från GitHub-fliken "Actions"
  workflow_dispatch:

# Behörigheter som behövs för Pages-deploy
permissions:
  contents: read
  pages: write
  id-token: write

# Tillåt bara en deploy åt gången; avbryt pågående om ny push kommer
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Bygg-jobbet ────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build with Vite
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ── Deploy-jobbet ──────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
